<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Village">
<meta name="mobile-web-app-capable" content="yes">
<title>Village — Cleaning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* Village colour tokens */
  --forest:#4C1D95;
  --deep-forest:#2E1065;
  --sage:#8B5CF6;
  --mist:#EDE9FE;
  --stone:#1C1917;
  --driftwood:#78716C;
  --pebble:#9B9589;
  --parchment:#F7F5F2;
  --linen:#EAE6E1;
  --white:#FFFFFF;
  --ember:#BE185D;
  --warm-white:#FDF2F8;

  /* Mapped to app vars */
  --bg:var(--white);
  --bg2:var(--parchment);
  --bg3:var(--linen);
  --text:var(--stone);
  --text2:var(--driftwood);
  --text3:var(--pebble);
  --border:var(--linen);
  --border2:#D6D0C9;
  --green:var(--forest);
  --green-bg:var(--mist);
  --green-dark:var(--deep-forest);
  --navy:var(--stone);
  --red:var(--ember);
  --red-bg:var(--warm-white);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --task-size:16px;--task-pad:16px;--tick-size:32px;--badge-size:11px;
  --card-radius:22px;--prog-h:8px;--sec-size:11px;
}
.easy-mode{
  --task-size:22px;--task-pad:20px;--tick-size:50px;--badge-size:14px;
  --card-radius:22px;--prog-h:14px;--sec-size:13px;
}
html,body{height:100%;overflow:hidden;background:var(--parchment);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{height:100%;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--parchment)}
.topbar{background:var(--stone);border-bottom:none;padding:calc(var(--safe-top) + 14px) 16px 14px;flex-shrink:0;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.topbar-left{flex:1;min-width:0}
.topbar-wordmark{font-size:21px;font-weight:800;color:var(--white);letter-spacing:-.02em;line-height:1;font-family:'DM Sans',sans-serif}
.topbar-tagline{font-size:13px;color:var(--sage);letter-spacing:.04em;margin-top:4px;font-weight:300;font-style:italic;font-family:'Cormorant Garamond',Georgia,serif}
.topbar-date{font-size:12px;color:var(--pebble);margin-bottom:1px}
.topbar-title{font-size:19px;font-weight:700;color:var(--white)}
.easy-toggle{display:flex;align-items:center;gap:6px;flex-shrink:0;padding-bottom:2px}
.easy-label{font-size:12px;color:var(--pebble);white-space:nowrap}
.toggle-sw{width:40px;height:24px;border-radius:12px;background:rgba(255,255,255,.2);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.toggle-sw.on{background:var(--sage)}
.toggle-sw::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s}
.toggle-sw.on::after{transform:translateX(16px)}
/* Light variant for use on white card backgrounds */
.toggle-sw-light{width:44px;height:26px;border-radius:13px;background:var(--linen);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.toggle-sw-light.on{background:var(--forest)}
.toggle-sw-light::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-sw-light.on::after{transform:translateX(18px)}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px;display:none}
.screen.active{display:block}

/* progress */
.progress-card{background:var(--white);margin:14px 14px 6px;border-radius:var(--card-radius);padding:20px;border:1px solid var(--linen)}
.prog-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.prog-label{font-size:14px;color:var(--driftwood);font-weight:500}
.prog-count{font-size:26px;font-weight:700;color:var(--stone)}
.easy-mode .prog-count{font-size:32px}
.prog-track{height:var(--prog-h);background:var(--linen);border-radius:5px;overflow:hidden}
.prog-bar{height:100%;background:var(--forest);border-radius:5px;transition:width 500ms cubic-bezier(.4,0,.2,1)}
.done-msg{display:none;margin-top:14px;padding:12px 16px;background:var(--mist);border-radius:12px;font-size:14px;font-weight:600;color:var(--deep-forest);text-align:center}
.done-msg.show{display:block}
.easy-mode .done-msg{font-size:18px;padding:16px}

/* section labels */
.sec-label{font-size:var(--sec-size);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pebble);padding:16px 16px 6px}

/* task cards */
.task-card{background:var(--white);margin:0 14px 10px;border-radius:var(--card-radius);border:1px solid var(--linen);overflow:hidden;transition:opacity .2s}
.task-card.done{opacity:.5}
.task-card.done .task-row{padding-top:10px;padding-bottom:10px}
.task-card.done .task-name{font-size:13px;text-decoration:line-through;color:var(--pebble)}
.task-card.done .task-badge{display:none}
.task-card.done .sess-badge{display:none}
.task-card.done .task-note{display:none}
.task-card.done .info-btn{display:none}
.task-card.done .remove-btn{display:none}
.task-card.done .drag-handle{display:none}
.task-card.done .tick{width:22px;height:22px;border-width:1.5px}
.easy-mode .task-card.done .task-name{font-size:15px}
.task-row{display:flex;align-items:center;gap:14px;padding:var(--task-pad) 14px var(--task-pad) 16px;cursor:pointer;user-select:none}
.tick{width:var(--tick-size);height:var(--tick-size);border-radius:50%;border:2px solid var(--linen);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 200ms ease;touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer}
.tick.on{background:var(--forest);border-color:var(--forest)}
.tick svg{display:none}
.tick.on svg{display:block}
.task-info{flex:1;min-width:0}
.task-name{font-size:var(--task-size);color:var(--stone);line-height:1.35;font-weight:500}
.task-badge{display:inline-block;margin-top:6px;font-size:var(--badge-size);font-weight:600;padding:3px 9px;border-radius:20px;letter-spacing:.02em}
.cat-personal{background:#F3EFF9;color:#3C3489}
.cat-nursery{background:#FFF0F5;color:#9B2C5A}
.cat-kitchen{background:#F3E8FF;color:#4C1D95}
.cat-medical{background:var(--warm-white);color:var(--ember)}
.cat-home{background:#FFF3E0;color:#633806}
.cat-garden{background:#F3E8FF;color:#4C1D95}
.cat-admin{background:#E3F2FD;color:#0C447C}
.cat-errands{background:#F3EFF9;color:#4A1554}
.cat-christmas{background:#FFF8E7;color:#7B341E}
.cat-extra{background:var(--linen);color:var(--driftwood)}
.cat-evening{background:#F0EEFF;color:#3C3489}
/* Cleaner-specific categories */
.cat-bathroom{background:#E0F2FE;color:#0369A1}
.cat-bedroom{background:#F3E8FF;color:#6B21A8}
.cat-hallway{background:#F5F5F4;color:#57534E}
.cat-livingroom{background:#FEF3C7;color:#92400E}
.cat-stairs{background:#F1F5F9;color:#334155}
.cat-landing{background:#CCFBF1;color:#0F766E}
.cat-utility{background:#FFF7ED;color:#C2410C}
.cat-kitchencons{background:#DCFCE7;color:#166534}
.cat-diningroom{background:#FEF9C3;color:#854D0E}
.cat-outside{background:#ECFDF5;color:#065F46}
/* drag handle */
.drag-handle{color:var(--linen);cursor:grab;padding:6px 2px 6px 0;font-size:16px;line-height:1;flex-shrink:0;user-select:none;-webkit-user-select:none;touch-action:none;min-width:20px;text-align:center}
.drag-handle:active{cursor:grabbing;color:var(--pebble)}
.task-card.dragging{opacity:.4;border:1.5px dashed var(--forest)}
.task-card.drag-over{border-top:3px solid var(--forest)}
.task-note{font-size:13px;color:var(--driftwood);padding:0 16px 14px 60px;line-height:1.5}
.easy-mode .task-note{font-size:17px;padding-left:76px}
/* remove button on task card */
.pick-header{background:var(--white);border-bottom:1px solid var(--linen);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.pick-header-title{font-size:17px;font-weight:700;color:var(--stone)}
.pick-header-sub{font-size:13px;color:var(--driftwood);margin-top:2px}
.pick-count-badge{background:var(--forest);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;letter-spacing:.02em}
.cat-section{margin-bottom:4px}
.cat-header{padding:14px 16px 6px;font-size:var(--sec-size);font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pebble)}
.pick-item{display:flex;align-items:center;gap:12px;padding:var(--task-pad) 16px;background:var(--white);border-bottom:1px solid var(--linen);cursor:pointer;user-select:none;transition:background .1s}
.pick-item:active{background:var(--parchment)}
.pick-item.selected{background:var(--mist)}
.pick-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--linen);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 200ms ease}
.easy-mode .pick-check{width:40px;height:40px}
.pick-item.selected .pick-check{background:var(--forest);border-color:var(--forest)}
.pick-check svg{display:none}
.pick-item.selected .pick-check svg{display:block}
.pick-item-info{flex:1;min-width:0}
.pick-item-name{font-size:var(--task-size);color:var(--stone);line-height:1.35;font-weight:500}
.pick-item.selected .pick-item-name{color:var(--deep-forest);font-weight:600}
.pick-item-cat{font-size:var(--badge-size);color:var(--pebble);margin-top:3px}
.pick-done-btn{position:fixed;bottom:calc(var(--safe-bot) + 68px);left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;z-index:20;pointer-events:none}
.pick-done-btn button{width:100%;padding:16px;background:var(--forest);color:#fff;border:none;border-radius:18px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;pointer-events:all;letter-spacing:.01em}
.pick-done-btn button:active{opacity:.85}
.easy-mode .pick-done-btn button{padding:20px;font-size:20px}

/* info modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(28,25,23,.6);z-index:300;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px calc(24px + var(--safe-bot));width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;color:var(--stone);margin-bottom:4px}
.modal-cat{font-size:12px;color:var(--pebble);margin-bottom:16px;font-weight:500;letter-spacing:.03em;text-transform:uppercase}
.modal-section-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--pebble);margin-bottom:6px}
.modal-desc{font-size:15px;color:var(--stone);line-height:1.6;background:var(--parchment);border-radius:12px;padding:14px 16px;min-height:60px;white-space:pre-wrap;word-break:break-word;border:1px solid var(--linen)}
.modal-session-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600}
.sess-lunchtime{background:#FFF8E7;color:#7B4A0A}
.sess-afternoon{background:#EEF4FF;color:#1A3A7C}
.sess-evening{background:#F0EEFF;color:#3C3489}
.sess-unset{background:var(--linen);color:var(--pebble)}
.modal-close{width:100%;padding:15px;border:none;background:var(--forest);border-radius:14px;font-size:15px;color:#fff;cursor:pointer;font-family:inherit;margin-top:16px;font-weight:600;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.modal-close:active{opacity:.85}
/* info button on task card */
.info-btn{background:none;border:none;color:var(--pebble);cursor:pointer;padding:6px 4px;font-size:16px;line-height:1;flex-shrink:0;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;transition:background .1s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.info-btn:active{background:var(--linen)}

/* Easy mode — larger, more visible info button */
.easy-mode .info-btn{width:40px;height:40px;font-size:22px;color:var(--forest);background:var(--mist);border-radius:50%}
.easy-mode .info-btn:active{background:var(--sage);color:#fff}

/* Easy mode — stronger modal text */
.easy-mode .modal-title{font-size:22px}
.easy-mode .modal-cat{font-size:15px;color:var(--driftwood)}
.easy-mode .modal-section-label{font-size:14px;color:var(--stone)}
.easy-mode .modal-desc{font-size:19px;color:var(--stone);line-height:1.7;font-weight:500}
.easy-mode .modal-close{font-size:19px;padding:20px;border-radius:18px}
/* remove button on task card */
.remove-btn{background:none;border:none;color:var(--pebble);cursor:pointer;padding:4px 6px;font-size:18px;line-height:1;flex-shrink:0;opacity:0.5;transition:opacity .15s;font-weight:300;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.remove-btn:active,.remove-btn:hover{opacity:1;color:var(--ember)}
.sess-badge{display:inline-block;margin-top:4px;margin-left:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
/* admin session select */
.sess-select{padding:6px 10px;border:1px solid var(--linen);border-radius:8px;background:var(--white);color:var(--stone);font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0}
/* log */
.log-wrap{padding:14px}
.log-card{background:var(--white);border-radius:var(--card-radius);border:1px solid var(--linen);padding:18px;margin-bottom:12px}
.log-datestr{font-size:11px;color:var(--pebble);margin-bottom:4px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.log-summary{font-size:17px;font-weight:700;color:var(--stone);margin-bottom:12px}
.log-prog{height:6px;background:var(--linen);border-radius:3px;overflow:hidden;margin-bottom:12px}
.log-prog-fill{height:100%;background:var(--forest);border-radius:3px}
.log-tags{display:flex;flex-wrap:wrap;gap:6px}
.log-tag{font-size:12px;padding:3px 10px;border-radius:20px;background:var(--parchment);color:var(--driftwood);border:1px solid var(--linen)}

/* admin */
.admin-wrap{padding:14px}
.card{background:var(--white);border-radius:var(--card-radius);border:1px solid var(--linen);padding:20px;margin-bottom:14px}
.card h3{font-size:16px;font-weight:700;color:var(--stone);margin-bottom:14px}
.fl{font-size:13px;color:var(--driftwood);margin-bottom:5px;margin-top:14px;display:block;font-weight:500}
input[type=text],select,textarea{width:100%;padding:13px 14px;border:1px solid var(--linen);border-radius:14px;background:var(--white);color:var(--stone);font-size:16px;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--forest);box-shadow:0 0 0 3px rgba(45,106,79,.12)}
.btn{width:100%;padding:15px;border:none;border-radius:18px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:8px;letter-spacing:.01em}
.btn-primary{background:var(--stone);color:#fff}
.btn-sec{background:var(--parchment);color:var(--driftwood);border:1px solid var(--linen)}
.btn-danger{background:var(--warm-white);color:var(--ember)}
.btn:active{opacity:.85}
.flash{display:none;text-align:center;padding:12px;background:var(--mist);border-radius:12px;color:var(--deep-forest);font-size:14px;font-weight:600;margin-top:12px}
.flash.show{display:block}
.master-item{display:flex;align-items:flex-start;gap:8px;padding:14px 0;border-bottom:1px solid var(--linen)}
.master-item:last-child{border-bottom:none}
.master-item-info{flex:1;min-width:0}
.master-item-name{font-size:14px;color:var(--stone);line-height:1.35;font-weight:500;word-break:break-word}
.master-item.inactive .master-item-name{color:var(--pebble);text-decoration:line-through}
.master-freq{font-size:11px;color:var(--pebble);margin-top:2px}
.master-item-controls{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:nowrap}
.tog-btn{padding:5px 11px;border:1px solid var(--linen);border-radius:8px;background:var(--parchment);color:var(--driftwood);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.tog-btn.on{background:var(--mist);color:var(--deep-forest);border-color:var(--sage)}
.del-btn{background:none;border:none;color:var(--pebble);cursor:pointer;font-size:20px;padding:4px 6px;line-height:1;flex-shrink:0}
.xmas-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.xmas-label{font-size:14px;color:var(--stone);font-weight:500}
.xmas-sub{font-size:12px;color:var(--pebble);margin-top:2px}
.admin-add-form{display:flex;flex-direction:column;gap:10px}
.admin-add-form input,.admin-add-form select{padding:11px 12px;font-size:15px}
.pin-wrap{display:flex;flex-direction:column;align-items:center;padding:30px 20px}
.pin-wrap h3{font-size:19px;font-weight:700;color:var(--stone);margin-bottom:6px}
.pin-wrap p{font-size:14px;color:var(--driftwood);margin-bottom:24px;text-align:center;line-height:1.6}
.pin-dots{display:flex;gap:12px;margin-bottom:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--linen);transition:background .15s}
.pin-dot.on{background:var(--stone);border-color:var(--stone)}
.pin-err{color:var(--ember);font-size:13px;min-height:18px;margin-bottom:14px;text-align:center}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pin-key{padding:16px;border:1px solid var(--linen);border-radius:14px;background:var(--white);color:var(--stone);font-size:20px;font-weight:500;cursor:pointer;font-family:inherit}
.pin-key:active{background:var(--parchment)}
.pin-hint{font-size:12px;color:var(--pebble);margin-top:14px;text-align:center}
.url-card{background:var(--white);border-radius:var(--card-radius);border:2px solid var(--forest);padding:20px}
.url-card h2{font-size:18px;font-weight:700;color:var(--stone);margin-bottom:8px}
.url-card p{font-size:14px;color:var(--driftwood);line-height:1.6;margin-bottom:16px}
.step{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;font-size:14px;color:var(--driftwood);line-height:1.5}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--forest);color:#fff;font-size:12px;font-weight:700;text-align:center;line-height:22px;flex-shrink:0}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--linen);border-top-color:var(--forest);border-radius:50%;animation:spin .7s linear infinite;-webkit-animation:spin .7s linear infinite}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@-webkit-keyframes spin{0%{-webkit-transform:rotate(0deg)}100%{-webkit-transform:rotate(360deg)}}
@media print{
  body{overflow:visible!important;height:auto!important}
  html{overflow:visible!important;height:auto!important}
  #app,#lock-screen{display:none!important}
  #print-content{
    display:block!important;
    position:absolute!important;
    top:0!important;left:0!important;
    width:100%!important;
    height:auto!important;
    overflow:visible!important;
    background:#fff!important;
  }
  .no-print{display:none!important}
  .print-session-block{break-before:page;page-break-before:always}
  .print-session-block:first-of-type{break-before:avoid;page-break-before:avoid}
  .print-session-header{break-inside:avoid;page-break-inside:avoid}
  .print-task-row{break-inside:avoid;page-break-inside:avoid}
  .print-signoff{break-inside:avoid;page-break-inside:avoid}
  tr{break-inside:avoid;page-break-inside:avoid}
  @page{margin:1.2cm;size:A4}
}
.loading-wrap p{font-size:15px;color:var(--pebble)}
.empty{text-align:center;padding:50px 20px;color:var(--pebble);font-size:15px;line-height:1.6}
.err-banner{background:var(--warm-white);color:var(--ember);padding:12px 16px;border-radius:14px;font-size:13px;margin:0 14px 10px;line-height:1.5;border:1px solid #F4C5A8}

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const SMONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const SDAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const CAT_LABELS={personal:'Personal care',nursery:'Nursery / boys room',kitchen:'Kitchen / food',medical:'Medical',home:'Home / cleaning',garden:'Garden / outdoors',admin:'Admin / paperwork',errands:'Errands / outings',christmas:'Christmas',evening:'Evening',extra:'Extra',bathroom:'Bathroom',bedroom:'Bedroom',hallway:'Hallway',livingroom:'Living room',stairs:'Stairs',landing:'Landing',utility:'Utility room',kitchencons:'Kitchen / conservatory',diningroom:'Dining room',outside:'Outside'};
const CAT_ORDER=['medical','personal','nursery','kitchen','home','garden','admin','errands','christmas','evening','bathroom','bedroom','hallway','livingroom','stairs','landing','utility','kitchencons','diningroom','outside','extra'];
const FREQ_LABELS={daily:'Every day',weekdays:'Weekdays','mon-wed-fri':'Mon/Wed/Fri','tue-thu':'Tue/Thu','wed-fri':'Wed/Fri','weekly-mon':'Weekly (Mon)','weekly-wed':'Weekly (Wed)','weekly-fri':'Weekly (Fri)','as-needed':'As needed'};

function todayKey(){
  const d=new Date();
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return d.getFullYear()+'-'+mm+'-'+dd;
}

let _viewOffset=0; // 0=today (used for reset), will be overridden by getCleanerDayOffset

// Returns offset to the NEXT Wednesday after today (never 0)
function wedOffset(){
  const d=new Date().getDay();
  const diff=(3-d+7)%7;
  return diff===0?7:diff; // if today IS Wed, go to next Wed
}
// Returns offset to the NEXT Friday after today (never 0)
function friOffset(){
  const d=new Date().getDay();
  const diff=(5-d+7)%7;
  return diff===0?7:diff; // if today IS Fri, go to next Fri
}

function viewKey(){
  const d=new Date();
  d.setDate(d.getDate()+_viewOffset);
  const mm=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return d.getFullYear()+'-'+mm+'-'+dd;
}

function viewLabel(){
  return'Today';
}
function ls(k,d){try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch{return d}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
const HARDCODED_API_URL='https://script.google.com/macros/s/AKfycbzIbLVhCFq8P-VXUMH4Ac1KgZIUyEDMyNNdSN98E_yqJHCIMabrJVzne3a8m9ppPS3oZw/exec';
// Clear any previously cached URL so the new deployment is always used
if(ls('api_url','')!==HARDCODED_API_URL)lsSet('api_url','');
function getApiUrl(){return HARDCODED_API_URL}
function setApiUrl(u){lsSet('api_url',u)}
function isAdminUnlocked(){return ls('admin_unlocked',false)}
function setAdminUnlocked(v){lsSet('admin_unlocked',v)}
function isEasyMode(){return ls('easy_mode',false)}

// Fetch with timeout using Promise.race — avoids AbortSignal cloning issues on mobile
function fetchWithTimeout(url,opts={},ms=25000){
  const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('Request timed out')),ms));
  return Promise.race([fetch(url,opts),timeout]);
}

async function api(action,params={}){
  const url=getApiUrl();if(!url)throw new Error('No API URL');
  const qs=Object.entries(params).map(([k,v])=>'&'+k+'='+encodeURIComponent(v)).join('');
  const r=await fetchWithTimeout(url+'?action='+action+qs);
  const d=await r.json();if(d.error)throw new Error(d.error);return d;
}
async function apiPost(body){
  const url=getApiUrl();if(!url)throw new Error('No API URL');
  const r=await fetchWithTimeout(url,{method:'POST',body:JSON.stringify(body)});
  const d=await r.json();if(d.error)throw new Error(d.error);return d;
}

let state={tasks:[],sessions:[],checked:[],pickedExtras:[],freeExtras:[],sessionOverrides:{},hiddenToday:[],settings:{}};
let appUnlocked=false; // declared here so all functions can reference it
let pinBuffer='';

function isScheduledToday(freq, date){
  const d=(date||new Date()).getDay();
  if(freq==='daily')return true;
  if(freq==='weekdays')return d>=1&&d<=5;
  if(freq==='mon-wed-fri')return[1,3,5].includes(d);
  if(freq==='tue-thu')return[2,4].includes(d);
  if(freq==='weekly-mon')return d===1;
  if(freq==='weekly-wed')return d===3;
  if(freq==='weekly-fri')return d===5;
  if(freq==='wed-fri')return d===3||d===5;
  return false;
}
function isNonDaily(freq){return freq!=='daily'&&freq!=='as-needed'&&freq!=='weekdays'&&freq!=='mon-wed-fri'&&freq!=='tue-thu'&&freq!=='weekly-mon'&&freq!=='weekly-wed'&&freq!=='weekly-fri'||freq==='as-needed'}
function showFlash(id){const el=document.getElementById(id);if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}}
function loading(){return'<div class="loading-wrap"><div class="spinner"></div><p>Loading...</p></div>'}

function toggleEasyMode(){
  const next=!isEasyMode();
  lsSet('easy_mode',next);
  document.getElementById('app').classList.toggle('easy-mode',next);
  document.getElementById('easy-sw').classList.toggle('on',next);
  // Update print button size to match
  const pb=document.getElementById('print-btn');
  if(pb&&pb.style.display!=='none'){
    pb.style.padding=next?'9px 16px':'6px 10px';
    pb.style.fontSize=next?'13px':'12px';
    pb.style.borderRadius=next?'20px':'8px';
    pb.style.fontWeight=next?'600':'400';
    pb.style.background=next?'rgba(82,183,136,0.25)':'rgba(255,255,255,.12)';
    pb.style.border=next?'1px solid rgba(82,183,136,0.5)':'1px solid rgba(255,255,255,.2)';
    pb.style.color=next?'#c8f0df':'rgba(255,255,255,.85)';
    pb.style.letterSpacing=next?'.02em':'0';
  }
}

function goScreen(name){
  if(!getApiUrl()&&name!=='admin'){goScreen('admin');return}
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('scr-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  const titles={today:"Today's tasks",pick:'Pick tasks',log:'Daily log',admin:'Admin'};
  // title is rendered inside each screen, not in the topbar
  const pb=document.getElementById('print-btn');
  if(pb){
    pb.style.display=name==='today'?'flex':'none';
    const easy=isEasyMode();
    pb.style.padding=easy?'9px 16px':'6px 10px';
    pb.style.fontSize=easy?'13px':'12px';
    pb.style.borderRadius=easy?'20px':'8px';
    pb.style.fontWeight=easy?'600':'400';
    pb.style.background=easy?'rgba(82,183,136,0.25)':'rgba(255,255,255,.12)';
    pb.style.border=easy?'1px solid rgba(82,183,136,0.5)':'1px solid rgba(255,255,255,.2)';
    pb.style.color=easy?'#c8f0df':'rgba(255,255,255,.85)';
    pb.style.letterSpacing=easy?'.02em':'0';
  }
  if(name==='today'){
    const wasOnOtherDay=_viewOffset!==0;
    _viewOffset=0;
    if(state.tasks.length===0||wasOnOtherDay)loadToday();
    else{renderToday();if(!_saveExtrasPending&&_savesInFlight===0)refreshToday();}
  }
  if(name==='pick'){
    if(state.tasks.length===0)loadToday().then(()=>renderPick());
    else{renderPick();if(!_saveExtrasPending&&_savesInFlight===0)refreshToday().then(()=>renderPick());}
  }
  if(name==='log')loadLog();
  if(name==='admin')renderAdmin();
}

// ── TODAY ─────────────────────────────────────────────────────
// Full load with spinner — used on first open only
async function loadToday(){
  document.getElementById('today-inner').innerHTML=loading();
  try{
    const[tr,sr_sess,cr,er,sr]=await Promise.all([
      api('getTasks'),
      api('getSessions'),
      api('getChecked',{date:viewKey()}),
      api('getExtras',{date:viewKey()}),
      api('getSettings'),
    ]);
    state.tasks=tr.tasks||[];
    state.sessions=sr_sess.sessions||[];
    state.checked=cr.ids||[];
    const extras=er.extras||[];
    const sentinel=extras.find(e=>e.id==='__picked__');
    state.pickedExtras=sentinel?(JSON.parse(sentinel.name||'[]')).map(String):[];
    const sessSentinel=extras.find(e=>e.id==='__session_overrides__');
    state.sessionOverrides=sessSentinel?JSON.parse(sessSentinel.name||'{}'):{};
    const hiddenSentinel=extras.find(e=>e.id==='__hidden__');
    state.hiddenToday=hiddenSentinel?(JSON.parse(hiddenSentinel.name||'[]')).map(String):[];
    state.freeExtras=extras.filter(e=>e.id&&e.id.startsWith('f_'));
    state.settings=sr.settings||{};
    renderToday();
  }catch(e){
    document.getElementById('today-inner').innerHTML=`<div class="err-banner">Could not load tasks — Google may be slow to start up.<br><small>${e.message}</small><br><br><button onclick="loadToday()" style="margin-top:4px;padding:8px 16px;background:var(--forest);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation">Try again</button></div>`;
  }
}

// Silent background refresh — no spinner, only re-renders if data changed
let _refreshing=false;
let _lastWrite=0;
let _savesInFlight=0; // counts active saves — refresh blocked while any are pending

function markWritten(){_lastWrite=Date.now();}
function beginSave(){_savesInFlight++;markWritten();}
function endSave(){if(_savesInFlight>0)_savesInFlight--;}
async function refreshToday(){
  if(_refreshing||!getApiUrl())return;
  if(_savesInFlight>0)return; // a save is still in progress — don't overwrite local state
  if(Date.now()-_lastWrite<15000)return; // grace period after last write — covers slow Apps Script
  _refreshing=true;
  try{
    const[tr,sr_sess,cr,er,sr]=await Promise.all([
      api('getTasks'),
      api('getSessions'),
      api('getChecked',{date:viewKey()}),
      api('getExtras',{date:viewKey()}),
      api('getSettings'),
    ]);
    const newTasks=tr.tasks||[];
    const newSessions=sr_sess.sessions||[];
    const newChecked=cr.ids||[];
    const extras=er.extras||[];
    const sentinel=extras.find(e=>e.id==='__picked__');
    const newPicked=sentinel?(JSON.parse(sentinel.name||'[]')).map(String):[];
    const sessSentinel=extras.find(e=>e.id==='__session_overrides__');
    const newOverrides=sessSentinel?JSON.parse(sessSentinel.name||'{}'):{};
    const hiddenSentinel=extras.find(e=>e.id==='__hidden__');
    const newHidden=hiddenSentinel?(JSON.parse(hiddenSentinel.name||'[]')).map(String):[];
    const newFree=extras.filter(e=>e.id&&e.id.startsWith('f_'));
    const newSettings=sr.settings||{};

    // Only update state + re-render if something actually changed
    const changed=
      JSON.stringify(newTasks)!==JSON.stringify(state.tasks)||
      JSON.stringify(newSessions)!==JSON.stringify(state.sessions)||
      JSON.stringify(newChecked)!==JSON.stringify(state.checked)||
      JSON.stringify(newPicked)!==JSON.stringify(state.pickedExtras)||
      JSON.stringify(newOverrides)!==JSON.stringify(state.sessionOverrides)||
      JSON.stringify(newHidden)!==JSON.stringify(state.hiddenToday)||
      JSON.stringify(newFree)!==JSON.stringify(state.freeExtras)||
      JSON.stringify(newSettings)!==JSON.stringify(state.settings);

    if(changed){
      state.tasks=newTasks;
      state.sessions=newSessions;
      state.checked=newChecked;
      state.pickedExtras=newPicked;
      state.sessionOverrides=newOverrides;
      state.hiddenToday=newHidden;
      state.freeExtras=newFree;
      state.settings=newSettings;
      // Re-render whichever screen is currently active
      const activeName=document.querySelector('.screen.active')?.id?.replace('scr-','');
      if(activeName==='today')renderToday();
      if(activeName==='pick')renderPick();
      showSyncPulse();
    }
  }catch(e){
    // Don't spam the console — just show a subtle offline indicator
    const isAbort=e.name==='AbortError'||e.message==='Failed to fetch'||e.message.includes('AbortSignal');
    if(!isAbort)console.warn('Background refresh failed:',e.message);
    showOfflineDot();
  }finally{
    _refreshing=false;
  }
}

async function switchView(offset){
  if(_viewOffset===offset)return;
  // Flush any pending saves for the current view before switching
  if(_saveExtrasTimer){
    clearTimeout(_saveExtrasTimer);
    _saveExtrasTimer=null;
    const sentinel={id:'__picked__',name:JSON.stringify(state.pickedExtras),cat:'',note:''};
    const sessSentinel={id:'__session_overrides__',name:JSON.stringify(state.sessionOverrides),cat:'',note:''};
    const hiddenSentinel={id:'__hidden__',name:JSON.stringify(state.hiddenToday),cat:'',note:''};
    const free=state.freeExtras.map(e=>({...e}));
    try{await apiPost({action:'setExtras',date:viewKey(),extras:[sentinel,sessSentinel,hiddenSentinel,...free]})}
    catch(e){console.warn('switchView flush failed:',e.message)}
    _saveExtrasPending=false;
    endSave();
  }
  _viewOffset=offset;
  loadToday();
}

function getPickedTaskObjects(){
  return state.pickedExtras
    .map(id=>state.tasks.find(t=>String(t.id)===String(id)))

function renderToday(){
  const now=new Date();
  const viewDate=new Date();
  viewDate.setDate(viewDate.getDate()+_viewOffset);
  const dateStr=DAYS[viewDate.getDay()]+', '+viewDate.getDate()+' '+MONTHS[viewDate.getMonth()];
  const isTomorrow=_viewOffset!==0; // kept for compatibility
  const xmasOn=state.settings.christmasMode==='true';
  const active=state.tasks.filter(t=>t.active&&(t.cat!=='christmas'||xmasOn))
    .sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const dailyTasks=active.filter(t=>isScheduledToday(t.freq,viewDate)&&t.freq!=='as-needed');
  const pickedTasks=getPickedTaskObjects();
  const activeSessIds=new Set(state.sessions.filter(s=>s.active!==false).map(s=>s.id));
  const allToday=[...dailyTasks,...pickedTasks,...state.freeExtras]
    .filter(t=>!state.hiddenToday.includes(String(t.id)));
  // Only count tasks that are actually visible (in active sessions or unassigned shown)
  const visibleToday=allToday.filter(t=>{
    const sid=getEffectiveSession(t);
    return sid==='unset'||activeSessIds.has(sid);
  });
  const total=visibleToday.length;
  const done=visibleToday.filter(t=>state.checked.includes(t.id)).length;
  const pct=total?Math.round(done/total*100):0;

  // Build date labels for upcoming Wed and Fri
  const wedDate=new Date();wedDate.setDate(wedDate.getDate()+wedOffset());
  const friDate=new Date();friDate.setDate(friDate.getDate()+friOffset());
  const wedLabel=`Wed ${wedDate.getDate()} ${MONTHS[wedDate.getMonth()]}`;
  const friLabel=`Fri ${friDate.getDate()} ${MONTHS[friDate.getMonth()]}`;
  const isToday=_viewOffset===0;
  const isWed=_viewOffset===wedOffset();
  const isFri=_viewOffset===friOffset();

  function pill(label,offset,active){
    return`<button onclick="switchView(${offset})" ontouchstart="event.preventDefault();switchView(${offset})" style="padding:6px 12px;border-radius:20px;border:1.5px solid ${active?'var(--forest)':'var(--linen)'};background:${active?'var(--forest)':'transparent'};color:${active?'#fff':'var(--driftwood)'};font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation;white-space:nowrap">${label}</button>`;
  }

  let html=`
  <div style="padding:18px 16px 4px">
    <div style="font-size:13px;color:var(--pebble);font-weight:500">${dateStr}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">
      <div style="font-size:22px;font-weight:700;color:var(--stone)">${isToday?'Today\'s tasks':'Planned tasks'}</div>
      <div style="display:flex;gap:6px">
        ${pill('Today',0,isToday)}
        ${pill(wedLabel,wedOffset(),isWed)}
        ${pill(friLabel,friOffset(),isFri)}
      </div>
    </div>
  </div>
  <div class="progress-card">
    <div class="prog-row">
      <span class="prog-label">${done === total && total > 0 ? 'All done!' : 'Progress'}</span>
      <span class="prog-count">${done} <span style="font-size:16px;font-weight:500;color:var(--pebble)">/ ${total}</span></span>
    </div>
    <div class="prog-track"><div class="prog-bar" style="width:${pct}%"></div></div>
    <div class="done-msg${total>0&&done===total?' show':''}">✓ All done for today — great work!</div>
  </div>
  <div style="text-align:right;padding:2px 16px 6px">
    <button onclick="loadToday()" style="background:none;border:none;font-size:12px;color:var(--pebble);cursor:pointer;font-family:inherit;padding:4px 0">&#8635; Refresh</button>
  </div>`;

  // Group tasks by session, ordered by session start time
  const currentSessId=getCurrentSessionId();
  const sessionGroups={};
  allToday.forEach(t=>{
    const sid=getEffectiveSession(t);
    if(!sessionGroups[sid])sessionGroups[sid]=[];
    sessionGroups[sid].push(t);
  });

  // Render sessions in time order, then unassigned at the end
  // Only show active sessions
  const orderedSessions=[...state.sessions]
    .filter(s=>s.active!==false)
    .sort((a,b)=>a.sortOrder-b.sortOrder);
  orderedSessions.forEach(sess=>{
    const tasks=sessionGroups[sess.id]||[];
    if(!tasks.length)return;
    const isCurrent=sess.id===currentSessId;
    const timeStr=sess.startTime&&sess.endTime?` <span style="font-size:10px;font-weight:400;opacity:.7">${sess.startTime}–${sess.endTime}</span>`:'';
    const currentBadge=isCurrent?` <span style="font-size:10px;font-weight:700;color:var(--forest);background:var(--mist);padding:2px 8px;border-radius:20px;margin-left:6px">NOW</span>`:'';
    html+=`<div class="sec-label" style="color:var(--driftwood)">${sess.emoji} ${sess.name}${timeStr}${currentBadge}</div>`;
    tasks.forEach(t=>{
      const isExtra=!isScheduledToday(t.freq)||t.freq==='as-needed'||String(t.id).startsWith('f_');
      html+=taskCardHtml(t,isExtra);
    });
  });

  // Unassigned tasks at the bottom
  const unassigned=sessionGroups['unset']||[];
  if(unassigned.length){
    html+=`<div class="sec-label" style="color:var(--pebble)">📋 Unassigned</div>`;

  // Pick tasks prompt at the bottom
  html+=`<div style="margin:12px 14px 8px;padding:14px 18px;background:var(--white);border-radius:var(--card-radius);border:1px dashed var(--linen);text-align:center">
    <div style="font-size:13px;color:var(--driftwood);margin-bottom:10px">Add extra tasks for today</div>
    <button onclick="goScreen('pick')" style="padding:9px 20px;background:var(--forest);color:#fff;border:none;border-radius:18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Pick tasks</button>
  </div>`;

  document.getElementById('today-inner').innerHTML=html;
  initSwipe();
}

// Migration map from old hardcoded strings to new session IDs
const SESSION_MIGRATION={'morning':'s_morning','lunchtime':'s_lunchtime','afternoon':'s_afternoon','evening':'s_evening'};

function migrateSessionId(val){
  if(!val||val==='unset')return'unset';
  // Already a proper session ID (starts with s_)
  if(state.sessions.some(s=>s.id===val))return val;
  // Try hardcoded migration map
  if(SESSION_MIGRATION[val])return SESSION_MIGRATION[val];
  // Try matching by session name (case-insensitive) as last resort
  const byName=state.sessions.find(s=>s.name.toLowerCase()===val.toLowerCase());
  if(byName)return byName.id;
  return'unset';
}

function getSessionById(id){
  return state.sessions.find(s=>s.id===id)||null;
}

function getEffectiveSession(t){
  const raw=state.sessionOverrides[String(t.id)]||t.session||'unset';
  return migrateSessionId(raw);
}

function getSessionLabel(id){
  const s=getSessionById(id);
  return s?`${s.emoji} ${s.name}`:'Unassigned';
}

function getCurrentSessionId(){
  // Find which session we're currently in based on time of day
  const now=new Date();
  const mins=now.getHours()*60+now.getMinutes();
  const sorted=[...state.sessions].sort((a,b)=>a.sortOrder-b.sortOrder);
  for(const s of sorted){
    const [sh,sm]=s.startTime.split(':').map(Number);
    const [eh,em]=s.endTime.split(':').map(Number);
    const start=sh*60+sm, end=eh*60+em;
    if(mins>=start&&mins<end)return s.id;
  }
  return null;
}

}

let _saveExtrasTimer=null;
let _saveExtrasPending=false; // true while debounce is waiting or save is in flight

function saveExtras(){
  markWritten();
  // Mark as pending immediately so refresh is blocked
  if(!_saveExtrasPending){
    _saveExtrasPending=true;
    _savesInFlight++;
  }
  // Debounce — reset the timer on each call, fire once things settle
  clearTimeout(_saveExtrasTimer);
  _saveExtrasTimer=setTimeout(async()=>{
    const sentinel={id:'__picked__',name:JSON.stringify(state.pickedExtras),cat:'',note:''};
    const sessSentinel={id:'__session_overrides__',name:JSON.stringify(state.sessionOverrides),cat:'',note:''};
    const hiddenSentinel={id:'__hidden__',name:JSON.stringify(state.hiddenToday),cat:'',note:''};
    const free=state.freeExtras.map(e=>({...e}));
    try{await apiPost({action:'setExtras',date:viewKey(),extras:[sentinel,sessSentinel,hiddenSentinel,...free]})}
    catch(e){console.error('saveExtras failed:',e)}
    finally{
      _saveExtrasPending=false;
      endSave();
    }
  },400);
}

async function loadLog(){
  document.getElementById('log-content').innerHTML=loading();
  try{const r=await api('getLog');renderLog(r.entries||[])}
  catch(e){document.getElementById('log-content').innerHTML=`<div class="err-banner">Could not load log.<br><small>${e.message}</small></div>`}

function renderLog(entries){
  if(!entries.length){document.getElementById('log-content').innerHTML='<div class="empty">No log entries yet.<br>Completed tasks appear here automatically.</div>';return}
  let html='';
  // Deduplicate by date — keep the entry with the most tasks done
  const byDate={};
  entries.forEach(entry=>{
    const key=entry.date;
    if(!byDate[key]||entry.done.length>byDate[key].done.length)byDate[key]=entry;
  });
  const deduped=Object.values(byDate).sort((a,b)=>b.date.localeCompare(a.date));
  deduped.forEach(entry=>{
    // Parse date robustly — handles YYYY-M-D and YYYY-MM-DD
    let d;
    const p=String(entry.date).match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(p){d=new Date(parseInt(p[1]),parseInt(p[2])-1,parseInt(p[3]));}
    else{d=new Date(entry.date);}
    const isValid=d instanceof Date&&!isNaN(d);
    const dateLabel=isValid?`${SDAYS[d.getDay()]} ${d.getDate()} ${SMONTHS[d.getMonth()]} ${d.getFullYear()}`:entry.date;
    const pct=entry.total?Math.round(entry.done.length/entry.total*100):0;
    const tags=entry.done.slice(0,5).map(n=>`<span class="log-tag">${n}</span>`).join('');
    const more=entry.done.length>5?`<span class="log-tag">+${entry.done.length-5} more</span>`:'';
    html+=`<div class="log-card">
      <div class="log-datestr">${dateLabel}</div>
      <div class="log-summary">${entry.done.length} of ${entry.total} tasks done — ${pct}%</div>
      <div class="log-prog"><div class="log-prog-fill" style="width:${pct}%"></div></div>
      <div class="log-tags">${tags}${more}</div>
    </div>`;
  });
  document.getElementById('log-content').innerHTML=html;
}

function pinKey(k){

  for(let i=0;i<4;i++){const el=document.getElementById('pd'+i);if(el)el.classList.toggle('on',i<pinBuffer.length)}
  if(pinBuffer.length===4)setTimeout(checkPin,120);

async function checkPin(){
  try{

// ── DRAG TO REORDER (Today view, touch-first for iOS) ─────────
let _drag={id:null,el:null,ghost:null,offsetY:0,lastTarget:null};
let _dragListenersAdded=false;

function initTodayDrag(){
  // Attach touchstart to each drag handle
  document.querySelectorAll('#today-inner .task-card[data-id]').forEach(el=>{
    const handle=el.querySelector('.drag-handle');
    if(!handle)return;

    // Clone and replace to remove stale listeners from previous renders
    const newHandle=handle.cloneNode(true);
    handle.parentNode.replaceChild(newHandle,handle);

    newHandle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      e.preventDefault();
      const t=e.touches[0];
      _startDrag(el,t.clientX,t.clientY);
    },{passive:false});

    newHandle.addEventListener('mousedown',e=>{
      e.preventDefault();
      _startDrag(el,e.clientX,e.clientY);
      const onMove=ev=>{ev.preventDefault();_moveDrag(ev.clientX,ev.clientY)};
      const onUp=()=>{
        _endDrag();
        window.removeEventListener('mousemove',onMove);
        window.removeEventListener('mouseup',onUp);
      };
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  });

  // Add document-level touch listeners only once ever
  if(!_dragListenersAdded){
    _dragListenersAdded=true;
    document.addEventListener('touchmove',e=>{
      if(!_drag.el)return;
      e.preventDefault();
      _moveDrag(e.touches[0].clientX,e.touches[0].clientY);
    },{passive:false});
    document.addEventListener('touchend',e=>{
      if(!_drag.el)return;
      _endDrag();
    },{passive:false});
    document.addEventListener('touchcancel',e=>{
      if(!_drag.el)return;
      // Clean up without reordering
      if(_drag.ghost)_drag.ghost.remove();
      if(_drag.el)_drag.el.style.opacity='';
      document.querySelectorAll('.task-card').forEach(c=>c.classList.remove('drag-over'));
      _drag={id:null,el:null,ghost:null,offsetY:0,lastTarget:null};
    },{passive:false});
  }
}

function _startDrag(el,clientX,clientY){
  _drag.id=el.dataset.id;
  _drag.el=el;
  _drag.lastTarget=null;

  const rect=el.getBoundingClientRect();
  _drag.offsetY=clientY-rect.top;

  // Create ghost clone that follows finger
  const ghost=el.cloneNode(true);
  ghost.style.cssText=`
    position:fixed;
    left:${rect.left}px;
    top:${rect.top}px;
    width:${rect.width}px;
    opacity:0.9;
    z-index:9990;
    pointer-events:none;
    border-radius:22px;
    box-shadow:0 12px 32px rgba(0,0,0,.25);
    transition:none;
    background:#fff;
    transform:scale(1.02);
  `;
  document.body.appendChild(ghost);
  _drag.ghost=ghost;
  el.style.opacity='0.3';
}

function _moveDrag(clientX,clientY){
  if(!_drag.ghost||!_drag.el)return;

  // Move ghost
  _drag.ghost.style.top=(clientY-_drag.offsetY)+'px';

  // Hit test — hide ghost briefly so it doesn't block the test
  _drag.ghost.style.display='none';
  const target=document.elementFromPoint(clientX,clientY);
  _drag.ghost.style.display='';

  // Walk up from target to find a task card
  const targetCard=target?.closest?.('#today-inner .task-card[data-id]');

  document.querySelectorAll('#today-inner .task-card').forEach(c=>c.classList.remove('drag-over'));

  if(targetCard&&targetCard!==_drag.el){
    targetCard.classList.add('drag-over');
    _drag.lastTarget=targetCard.dataset.id;
  }
}

function _endDrag(){
  if(_drag.ghost)_drag.ghost.remove();
  if(_drag.el)_drag.el.style.opacity='';
  document.querySelectorAll('#today-inner .task-card').forEach(c=>c.classList.remove('drag-over'));

  const fromId=_drag.id;
  const toId=_drag.lastTarget;
  _drag={id:null,el:null,ghost:null,offsetY:0,lastTarget:null};

  if(toId&&toId!==fromId){
    reorderTask(fromId,toId);
  }
}

async function reorderTask(fromId,toId){
  const sorted=[...state.tasks].sort((a,b)=>(a.sortOrder||0)-(b.sortOrder||0));
  const fromIdx=sorted.findIndex(t=>String(t.id)===String(fromId));
  const toIdx=sorted.findIndex(t=>String(t.id)===String(toId));
  if(fromIdx===-1||toIdx===-1){console.warn('reorder: task not found',fromId,toId);return;}
  const [moved]=sorted.splice(fromIdx,1);
  sorted.splice(toIdx,0,moved);
  sorted.forEach((t,i)=>t.sortOrder=i);
  state.tasks=sorted;
  markWritten();   // block background refresh immediately
  beginSave();     // count as in-flight so refresh waits for completion
  renderToday();
  try{
    await apiPost({action:'reorderTasks',order:sorted.map(t=>t.id)});
  }catch(e){console.error('reorder save failed:',e)}
  finally{endSave()}
}

// ── PRINT ─────────────────────────────────────────────────────
function printToday(){
  // Show session picker before printing
  const xmasOn=state.settings.christmasMode==='true';
  const active=state.tasks.filter(t=>t.active&&(t.cat!=='christmas'||xmasOn));
  const dailyTasks=active.filter(t=>isScheduledToday(t.freq,new Date(Date.now()+_viewOffset*86400000))&&t.freq!=='as-needed');
  const pickedTasks=getPickedTaskObjects();
  const allToday=[...dailyTasks,...pickedTasks,...state.freeExtras]
    .filter(t=>!state.hiddenToday.includes(String(t.id)));

  if(!allToday.length){alert('No tasks to print for today.');return}

  // Work out which sessions have tasks today
  const orderedSess=[...state.sessions]
    .filter(s=>s.active!==false)
    .sort((a,b)=>a.sortOrder-b.sortOrder);
  const sessionsWithTasks=orderedSess.filter(s=>
    allToday.some(t=>getEffectiveSession(t)===s.id)
  );
  const hasUnassigned=allToday.some(t=>getEffectiveSession(t)==='unset');

  // Build picker modal
  const sessionRows=sessionsWithTasks.map(s=>`
    <label style="display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--linen);border-radius:12px;background:var(--white);cursor:pointer;font-size:15px;color:var(--stone)">
      <input type="checkbox" value="${s.id}" checked style="width:18px;height:18px;accent-color:var(--forest);cursor:pointer;flex-shrink:0">
      <span style="font-size:18px">${s.emoji}</span>
      <span style="flex:1;font-weight:500">${s.name}</span>
      <span style="font-size:12px;color:var(--pebble)">${allToday.filter(t=>getEffectiveSession(t)===s.id).length} tasks</span>
    </label>`).join('');

  const unassignedRow=hasUnassigned?`
    <label style="display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--linen);border-radius:12px;background:var(--white);cursor:pointer;font-size:15px;color:var(--stone)">
      <input type="checkbox" value="unset" checked style="width:18px;height:18px;accent-color:var(--forest);cursor:pointer;flex-shrink:0">
      <span style="font-size:18px">📋</span>
      <span style="flex:1;font-weight:500">Unassigned</span>
      <span style="font-size:12px;color:var(--pebble)">${allToday.filter(t=>getEffectiveSession(t)==='unset').length} tasks</span>
    </label>`:'';

  document.getElementById('info-modal-content').innerHTML=`
    <div class="modal-title">Print today's tasks</div>
    <div class="modal-cat" style="margin-bottom:16px">Select which sessions to include</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
      ${sessionRows}${unassignedRow}
    </div>
    <button class="modal-close" ontouchstart="event.preventDefault();doPrint()" onclick="doPrint()" style="margin-bottom:8px">🖨 Print selected</button>
    <button onclick="closeInfoModal()" ontouchstart="event.preventDefault();closeInfoModal()" style="width:100%;padding:13px;border:1px solid var(--linen);border-radius:14px;background:var(--parchment);color:var(--driftwood);font-size:15px;cursor:pointer;font-family:inherit;touch-action:manipulation">Cancel</button>`;

  document.getElementById('info-modal-bg').classList.add('open');
}

function doPrint(){
  // Read selected sessions from checkboxes
  const checked=[...document.querySelectorAll('#info-modal-content input[type=checkbox]:checked')].map(cb=>cb.value);
  closeInfoModal();
  if(!checked.length){alert('Please select at least one session.');return}
  printWithSessions(checked);
}

function printWithSessions(selectedSessions){
  const now=new Date();
  const viewDate=new Date(Date.now()+_viewOffset*86400000);
  const dateStr=DAYS[viewDate.getDay()]+' '+viewDate.getDate()+' '+MONTHS[viewDate.getMonth()]+' '+viewDate.getFullYear();
  const xmasOn=state.settings.christmasMode==='true';
  const active=state.tasks.filter(t=>t.active&&(t.cat!=='christmas'||xmasOn));
  const dailyTasks=active.filter(t=>isScheduledToday(t.freq,new Date(Date.now()+_viewOffset*86400000))&&t.freq!=='as-needed');
  const pickedTasks=getPickedTaskObjects();
  const allToday=[...dailyTasks,...pickedTasks,...state.freeExtras]
    .filter(t=>!state.hiddenToday.includes(String(t.id)));

  if(!allToday.length){alert('No tasks to print for today.');return}

  // Group by dynamic sessions ordered by time, filtered to selected only
  const printSessions=[...state.sessions]
    .filter(s=>selectedSessions.includes(s.id))
    .sort((a,b)=>a.sortOrder-b.sortOrder);
  const printGroups={unset:[]};
  printSessions.forEach(s=>printGroups[s.id]=[]);
  allToday.forEach(t=>{
    const sid=getEffectiveSession(t);
    if(printGroups[sid])printGroups[sid].push(t);
    else if(selectedSessions.includes('unset'))printGroups['unset'].push(t);
  });

  function taskRow(t){
    const isDone=state.checked.includes(t.id);
    const checkbox=isDone
      ?`<div style="width:18px;height:18px;background:#4C1D95;border:1.5px solid #4C1D95;border-radius:3px;margin-top:1px;display:flex;align-items:center;justify-content:center">
          <svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4,8.5 9.5,2" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>`
      :`<div style="width:18px;height:18px;border:1.5px solid #9ca3af;border-radius:3px;margin-top:1px"></div>`;
    const nameStyle=isDone
      ?'text-decoration:line-through;color:#9B9589;'
      :'color:#1a1a2e;';
    return`<tr style="${isDone?'opacity:0.6;background:#fafaf9;':''}">
      <td style="width:32px;padding:10px 8px 10px 12px;border-bottom:1px solid #e5e7eb;vertical-align:top">
        ${checkbox}
      </td>
      <td style="padding:10px 12px 10px 4px;border-bottom:1px solid #e5e7eb;font-size:13px;line-height:1.4;vertical-align:top;${nameStyle}">
        ${t.name}${!isDone&&t.desc?`<div style="font-size:11px;color:#6b7280;margin-top:3px">${t.desc}</div>`:''}${!isDone&&t.note?`<div style="font-size:11px;color:#6b7280;margin-top:3px">${t.note}</div>`:''}
      </td>
    </tr>`;
  }

  function sectionBlock(label,emoji,colour,tasks,carerName){
    if(!tasks.length)return'';
    const doneCnt=tasks.filter(t=>state.checked.includes(t.id)).length;
    const remaining=tasks.length-doneCnt;
    const countLabel=doneCnt>0
      ?`${remaining} remaining · ${doneCnt} done`
      :`${tasks.length} task${tasks.length!==1?'s':''}`;
    const carerLine=carerName?` <span style="font-weight:400;color:#6b7280">— Thanks, ${carerName}</span>`:'';
    return`
      <div class="print-session-block" style="margin-bottom:24px">
        <div class="print-session-header" style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:${colour};border-radius:8px 8px 0 0;border:1px solid #e5e7eb;border-bottom:none">
          <span style="font-size:16px">${emoji}</span>
          <span style="font-size:14px;font-weight:700;color:#1a1a2e;letter-spacing:.02em">${label}${carerLine}</span>
          <span style="margin-left:auto;font-size:12px;color:#6b7280">${countLabel}</span>
        </div>
        <table style="width:100%;border-collapse:collapse;border:1px solid #e5e7eb;border-radius:0 0 8px 8px;overflow:hidden">
          ${tasks.map(taskRow).join('')}
        </table>
        <div class="print-signoff" style="margin-top:10px;padding:8px 14px;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;color:#9ca3af;display:flex;justify-content:space-between">
          <span>Carer: ___________________________</span>
          <span>Time: ____________</span>
          <span>Signature: ___________________________</span>
        </div>
      </div>`;
  }

  const total=allToday.length;
  const body=printSessions
    .filter(s=>printGroups[s.id]&&printGroups[s.id].length)
    .map(s=>sectionBlock(s.name,s.emoji,'#FAFAFA',printGroups[s.id],s.carerName||''))
    .join('')+
    (printGroups['unset'].length?sectionBlock('Unassigned','📋','#F3F4F6',printGroups['unset'],''):'');

  // Write content into the permanent print div (always in DOM — iOS renders it before print)
  const printDiv=document.getElementById('print-content');
  printDiv.innerHTML=`
    <div class="no-print" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;padding:20px 28px 0">
      <button id="print-back-btn" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#f5f7fa;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;color:#1a1a2e;cursor:pointer;font-family:inherit;font-weight:500">← Back to app</button>
      <button onclick="window.print()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#1a1a2e;border:none;border-radius:8px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;font-weight:500">🖨 Print / Save PDF</button>
    </div>
    <div style="padding:20px 28px 28px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;padding-bottom:16px;border-bottom:2px solid #1a1a2e">
        <div>
          <div style="font-size:22px;font-weight:700;color:#1a1a2e">Daily Care Tasks</div>
          <div style="font-size:14px;color:#6b7280;margin-top:4px">${dateStr}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;color:#6b7280">${total} tasks today</div>
          <div style="font-size:11px;color:#9ca3af;margin-top:4px">Printed ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}</div>
        </div>
      </div>
      ${body}
    </div>`;

  // Show the print content and hide the app
  printDiv.style.display='block';
  document.getElementById('app').style.display='none';
  markWritten();

  // Wire up back button
  document.getElementById('print-back-btn').addEventListener('click',()=>{
    printDiv.style.display='none';
    printDiv.innerHTML='';
    document.getElementById('app').style.display='';
  });

  // Wait two frames for layout then print
  // Content is already in the DOM so iOS can render it fully
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      window.print();
    });
  });
}

// ── INFO MODAL ────────────────────────────────────────────────
function setAppContentInteractive(on){
  // Target only the content area and nav — never the lock screen itself
  ['scr-today','scr-pick','scr-log','scr-admin','.bottom-nav'].forEach(sel=>{
    const el=sel.startsWith('.')?document.querySelector(sel):document.getElementById(sel);
    if(el)el.style.pointerEvents=on?'':'none';
  });
}

let _infoLastFire=0;
function openInfoModal(id){
  const now=Date.now();
  if(now-_infoLastFire<300)return;
  _infoLastFire=now;
  // Look in both regular tasks and free extras
  const t=state.tasks.find(t=>String(t.id)===String(id))
    ||state.freeExtras.find(t=>String(t.id)===String(id));
  if(!t)return;
  renderInfoModal(id);
  const bg=document.getElementById('info-modal-bg');
  if(bg)bg.classList.add('open');
}

function renderInfoModal(id){
  const t=state.tasks.find(t=>String(t.id)===String(id))
    ||state.freeExtras.find(t=>String(t.id)===String(id));
  if(!t)return;
  const effSess=getEffectiveSession(t);
  const isOverridden=!!state.sessionOverrides[String(t.id)];
  const defaultSessId=migrateSessionId(t.session||'unset');
  const defaultSessObj=getSessionById(defaultSessId);

  // Build toggle buttons from live sessions
  const sessOptions=[
    ...state.sessions.filter(s=>s.active!==false).map(s=>({val:s.id,label:s.name,emoji:s.emoji})),
    {val:'unset',label:'Unassigned',emoji:'○'}
  ];

  const toggleBtns=sessOptions.map(o=>`
    <button onclick="setSessionOverride('${id}','${o.val}')"
      ontouchstart="event.preventDefault();setSessionOverride('${id}','${o.val}')"
      style="width:100%;padding:13px 16px;border:1.5px solid ${effSess===o.val?'#6D28D9':'var(--linen)'};border-radius:12px;background:${effSess===o.val?'#EDE9FE':'var(--white)'};cursor:pointer;font-family:inherit;font-size:15px;font-weight:${effSess===o.val?'600':'400'};color:${effSess===o.val?'#3B0764':'var(--stone)'};transition:all .15s;display:flex;align-items:center;gap:12px;text-align:left;touch-action:manipulation;-webkit-tap-highlight-color:transparent">
      <span style="font-size:20px;width:28px;text-align:center">${o.emoji}</span>
      <span style="flex:1">${o.label}</span>
      ${effSess===o.val?'<span style="color:#6D28D9;font-size:16px">✓</span>':''}
    </button>`).join('');

  const overrideNote=isOverridden
    ?`<div style="font-size:11px;color:#3B0764;background:#EDE9FE;border-radius:6px;padding:5px 10px;margin-top:8px;display:inline-block">Today's override — resets tomorrow</div>`
    :(defaultSessObj?`<div style="font-size:11px;color:var(--text3);margin-top:6px">Default: ${defaultSessObj.emoji} ${defaultSessObj.name}</div>`:
      defaultSessId==='unset'?'':
      `<div style="font-size:11px;color:var(--text3);margin-top:6px">Default: ${defaultSessId}</div>`);;

  document.getElementById('info-modal-content').innerHTML=`
    <div class="modal-title">${t.name}</div>
    <div class="modal-cat">${CAT_LABELS[t.cat]||t.cat||'Extra'}</div>
    <div style="height:16px"></div>
    <div class="modal-section-label">Session</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">${toggleBtns}</div>
    ${overrideNote}
    ${t.desc?`<div style="height:16px"></div>
    <div class="modal-section-label">Notes &amp; instructions</div>
    <div class="modal-desc" style="margin-top:8px">${t.desc}</div>`:''}
    <button class="modal-close" onclick="closeInfoModal()">Done</button>`;
}

async function setSessionOverride(id,session){
  if(session==='unset'){
    delete state.sessionOverrides[String(id)];
  } else {
    state.sessionOverrides[String(id)]=session;
  }
  markWritten();
  renderInfoModal(id);  // re-render modal with new selection highlighted
  renderToday();        // update badge on task card immediately
  saveExtras();         // persist to Sheets in background
}
function closeInfoModal(){document.getElementById('info-modal-bg').classList.remove('open')}
// Wire up info modal background tap-to-close
(function(){
  const bg=document.getElementById('info-modal-bg');
  if(bg)bg.addEventListener('click',e=>{if(e.target===bg)closeInfoModal()});
})();

// ── LOCK SCREEN ───────────────────────────────────────────────
const LOCK_PIN='2512';
let lockBuffer='';

let _lockKeyLastFire=0;
function lockKey(k){
  // Debounce to prevent touchstart+click double-fire on iOS
  const now=Date.now();
  if(now-_lockKeyLastFire<300)return;
  _lockKeyLastFire=now;
  if(k==='del'){
    lockBuffer=lockBuffer.slice(0,-1);
  } else if(k==='ok'){
    checkLockPin();
    return;
  } else if(lockBuffer.length<4){
    lockBuffer+=k;
  }
  updateLockDots();
  if(lockBuffer.length===4)setTimeout(checkLockPin,120);
}

function updateLockDots(){
  for(let i=0;i<4;i++){
    const dot=document.getElementById('lp'+i);
    if(dot){
      dot.style.background=i<lockBuffer.length?'#8B5CF6':'transparent';
    }
  }
}

function checkLockPin(){
  if(lockBuffer===LOCK_PIN){
    appUnlocked=true;
    // Restore touch interaction to app content
    setAppContentInteractive(true);
    const ls=document.getElementById('lock-screen');
    if(ls){
      ls.style.opacity='0';
      ls.style.transition='opacity .3s ease';
      setTimeout(()=>{ls.style.display='none'},300);
    }
    lockBuffer='';
    updateLockDots();
  } else {
    const err=document.getElementById('lock-err');
    if(err){
      err.textContent='Incorrect PIN — try again';
      setTimeout(()=>{err.textContent=''},2000);
    }
    lockBuffer='';
    updateLockDots();
    // Shake the dots
    const dots=document.getElementById('lock-dots');
    if(dots){
      dots.style.transform='translateX(8px)';
      setTimeout(()=>{dots.style.transform='translateX(-8px)'},80);
      setTimeout(()=>{dots.style.transform='translateX(0)'},160);
    }
  }
}

let _printWindowOpen=false; // kept for safety — no longer triggers popup

// Re-lock whenever the user leaves the app
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'){
    // Don't re-lock if we just opened the print popup
    if(_printWindowOpen){_printWindowOpen=false;return;} // legacy flag, kept for safety
    appUnlocked=false;
    lockBuffer='';
    closeInfoModal(); // close any open modal before locking
    const ls=document.getElementById('lock-screen');
    if(ls){
      ls.style.opacity='1';
      ls.style.display='flex';
      updateLockDots();
      const err=document.getElementById('lock-err');
      if(err)err.textContent='';
      setAppContentInteractive(false);
    }
  }
  // Normal sync refresh when returning (only if unlocked)
  if(document.visibilityState==='visible'&&getApiUrl()&&appUnlocked){
    markWritten();
    refreshToday();
  }
});

// ── INIT ──────────────────────────────────────────────────────
const easyOn=isEasyMode();
document.getElementById('app').classList.toggle('easy-mode',easyOn);
document.getElementById('easy-sw').classList.toggle('on',easyOn);
setAppContentInteractive(false); // locked on load
const now=new Date();
// date is rendered inside renderToday, not in the topbar
if(!getApiUrl())goScreen('admin');else goScreen('today');
</script>
